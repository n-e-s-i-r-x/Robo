<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>R0B0T</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #111;
      font-family: monospace;
      overflow: hidden;
      touch-action: none;
      user-select: none;
    }

    /* ── LANDING ── */
    #landing {
      position: fixed;
      inset: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      z-index: 100;
      transition: opacity 0.3s;
    }
    #landing.hide {
      opacity: 0;
      pointer-events: none;
    }

    #landing h1 {
      font-size: clamp(3rem, 14vw, 6rem);
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.25em;
    }

    #startBtn {
      background: #fff;
      color: #111;
      border: none;
      font-family: monospace;
      font-weight: 900;
      font-size: clamp(1rem, 5vw, 1.4rem);
      letter-spacing: 0.2em;
      padding: 18px 60px;
      border-radius: 8px;
      cursor: pointer;
    }

    /* ── SKIN PICKER ── */
    .skin-label {
      color: #555;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-align: center;
    }

    .skins {
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    .skin-swatch {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      cursor: pointer;
      border: 3px solid transparent;
      transition: border-color 0.15s;
      flex-shrink: 0;
    }
    .skin-swatch.selected {
      border-color: #fff;
    }

    /* ── ROBOT SCREEN ── */
    #robotScreen {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #111;
    }
    #robotScreen.active {
      display: flex;
    }

    #cam {
      display: none;
    }
    #motionCanvas {
      display: none;
    }

    /* ── EYES (landscape only) ── */
    .eyes-wrap {
      display: flex;
      gap: clamp(28px, 9vw, 64px);
      align-items: center;
      justify-content: center;
      flex-direction: row;
    }

    .eye {
      width: clamp(130px, 32vw, 210px);
      height: clamp(130px, 32vw, 210px);
      border-radius: 22px;
      position: relative;
      overflow: hidden;
      background: transparent;
      transition: height 0.08s linear;
    }

    .eye.blink {
      height: 10px !important;
      border-radius: 5px;
    }

    /* the small moving shape – plain color, no black */
    .dot {
      width: 28%;
      height: 28%;
      border-radius: 8px;
      background: #fff;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      will-change: transform;
      box-shadow: none;
    }

    /* debug indicator */
    #debugDot {
      position: fixed;
      top: 8px;
      right: 8px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #333;
      z-index: 300;
    }
    #debugDot.cam-ok { background: #3bff7a; }
    #debugDot.motion { background: #ffcc00; }

    /* back button */
    #backBtn {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: transparent;
      border: 1px solid #333;
      color: #333;
      font-family: monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      padding: 8px 22px;
      border-radius: 4px;
      cursor: pointer;
      z-index: 200;
    }
  </style>
</head>
<body>
  <!-- LANDING -->
  <div id="landing">
    <h1>R0B0T</h1>
    <button id="startBtn" onclick="startRobot()">START</button>
    <div class="skin-label">EYE COLOR</div>
    <div class="skins" id="skins"></div>
  </div>

  <!-- ROBOT -->
  <div id="robotScreen">
    <video id="cam" autoplay playsinline muted></video>
    <canvas id="motionCanvas"></canvas>
    <div class="eyes-wrap">
      <div class="eye" id="eyeL"><div class="dot" id="dotL"></div></div>
      <div class="eye" id="eyeR"><div class="dot" id="dotR"></div></div>
    </div>
    <div id="debugDot"></div>
    <button id="backBtn" onclick="goBack()">← EXIT</button>
  </div>

  <script>
    // ── SKINS ──
    const SKINS = [
      { color: '#ffffff' },
      { color: '#ff3b3b' },
      { color: '#3b8fff' },
      { color: '#3bff7a' },
      { color: '#ffcc00' },
      { color: '#ff6aff' },
      { color: '#ff8c00' },
      { color: '#00e5ff' },
    ];

    let activeSkin = 0;
    const swatchContainer = document.getElementById('skins');

    SKINS.forEach((s, i) => {
      const sw = document.createElement('div');
      sw.className = 'skin-swatch' + (i === 0 ? ' selected' : '');
      sw.style.background = s.color;
      sw.onclick = () => {
        activeSkin = i;
        document.querySelectorAll('.skin-swatch').forEach((el, j) =>
          el.classList.toggle('selected', j === i)
        );
        if (document.getElementById('robotScreen').classList.contains('active')) {
          applyDotColor();
        }
      };
      swatchContainer.appendChild(sw);
    });

    function applyDotColor() {
      const c = SKINS[activeSkin].color;
      document.getElementById('dotL').style.background = c;
      document.getElementById('dotR').style.background = c;
    }

    // ── STATE ──
    let stream = null;
    let animFrame = null;
    let blinkTimer = null;
    let smoothFrame = null;
    let prevGray = null;        // previous grayscale frame (1 channel)
    let targetX = 0, targetY = 0;
    let currentX = 0, currentY = 0;
    let motionWorking = false;  // flag: has motion detection produced results?
    let lastMotionTime = 0;     // timestamp of last detected motion

    const video = document.getElementById('cam');
    const motCanvas = document.getElementById('motionCanvas');
    // FIX #1: willReadFrequently tells Chrome to keep canvas in CPU memory
    // Without this, getImageData returns stale/empty pixels on GPU-accelerated canvases
    const motCtx = motCanvas.getContext('2d', { willReadFrequently: true });
    const dotL = document.getElementById('dotL');
    const dotR = document.getElementById('dotR');
    const eyeL = document.getElementById('eyeL');
    const eyeR = document.getElementById('eyeR');
    const debugDot = document.getElementById('debugDot');

    // ── START ──
    async function startRobot() {
      applyDotColor();

      try {
        if (screen.orientation && screen.orientation.lock) {
          screen.orientation.lock('landscape').catch(() => {});
        }

        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: 'user',
            width: { ideal: 320 },
            height: { ideal: 240 }
          },
          audio: false
        });
        video.srcObject = stream;
        await video.play();

        // go fullscreen
        try {
          const el = document.documentElement;
          if (el.requestFullscreen) await el.requestFullscreen();
          else if (el.webkitRequestFullscreen) await el.webkitRequestFullscreen();
        } catch (e) {}

        document.getElementById('landing').classList.add('hide');
        setTimeout(() => {
          document.getElementById('landing').style.display = 'none';
          document.getElementById('robotScreen').classList.add('active');
        }, 300);

        // Wait until the video actually has frame data (videoWidth > 0)
        // This is more reliable than readyState which can be >= 2 before frames exist
        const waitForFrames = () => new Promise(resolve => {
          const check = () => {
            if (video.videoWidth > 0 && video.readyState >= 2) {
              resolve();
            } else {
              requestAnimationFrame(check);
            }
          };
          check();
        });

        await waitForFrames();

        // Now we know the video has real frames — set up canvas to match
        motCanvas.width = video.videoWidth;
        motCanvas.height = video.videoHeight;

        debugDot.classList.add('cam-ok');

        startMotion();
        startBlink();
        smoothLoop();
        startTouchInput();

      } catch (err) {
        alert('Please allow camera access!');
      }
    }

    // ── MOTION DETECTION ──
    function startMotion() {
      const MOTION_THRESHOLD = 25;   // per-pixel grayscale diff to count as motion
      const MIN_PIXELS = 8;          // minimum changed pixels to trust the centroid
      const DECAY = 0.85;            // how fast target returns to center with no motion

      function detect() {
        if (!video.videoWidth) {
          animFrame = requestAnimationFrame(detect);
          return;
        }

        try {
          // draw current frame to canvas
          motCtx.drawImage(video, 0, 0, motCanvas.width, motCanvas.height);
          const raw = motCtx.getImageData(0, 0, motCanvas.width, motCanvas.height);
          const data = raw.data;
          const w = motCanvas.width;
          const h = motCanvas.height;
          const totalPixels = w * h;

          // build single-channel grayscale array (much lighter than RGBA)
          const gray = new Uint8Array(totalPixels);
          for (let i = 0; i < totalPixels; i++) {
            const off = i * 4;
            gray[i] = (data[off] * 77 + data[off + 1] * 150 + data[off + 2] * 29) >> 8;
          }

          // compare with previous frame
          if (prevGray) {
            let sumX = 0, sumY = 0, count = 0;

            for (let i = 0; i < totalPixels; i++) {
              const diff = Math.abs(gray[i] - prevGray[i]);
              if (diff > MOTION_THRESHOLD) {
                const px = i % w;
                const py = (i / w) | 0;
                sumX += px;
                sumY += py;
                count++;
              }
            }

            if (count > MIN_PIXELS) {
              // front camera is mirrored — flip X
              const nx = -((sumX / count / w) - 0.5) * 2;
              const ny = ((sumY / count / h) - 0.5) * 2;
              targetX = Math.max(-1, Math.min(1, nx));
              targetY = Math.max(-1, Math.min(1, ny));
              lastMotionTime = performance.now();

              if (!motionWorking) {
                motionWorking = true;
                debugDot.classList.add('motion');
              }
            } else {
              // decay toward center
              targetX *= DECAY;
              targetY *= DECAY;
            }
          }

          prevGray = gray;

        } catch (err) {
          // FIX #2: if getImageData fails (taint, security), don't kill the loop
          // Just skip this frame and try again next frame
          console.warn('Motion detection frame error:', err.message);
        }

        animFrame = requestAnimationFrame(detect);
      }

      detect();
    }

    // ── TOUCH / MOUSE FALLBACK INPUT ──
    // FIX #3: If camera motion detection fails, touch/mouse still moves the eyes
    function startTouchInput() {
      const screen = document.getElementById('robotScreen');

      function handleInput(clientX, clientY) {
        const nx = (clientX / window.innerWidth - 0.5) * 2;
        const ny = (clientY / window.innerHeight - 0.5) * 2;
        // override motion target with direct input
        targetX = Math.max(-1, Math.min(1, nx));
        targetY = Math.max(-1, Math.min(1, ny));
        lastMotionTime = performance.now();
      }

      screen.addEventListener('touchstart', e => {
        const t = e.touches[0];
        handleInput(t.clientX, t.clientY);
      }, { passive: true });

      screen.addEventListener('touchmove', e => {
        const t = e.touches[0];
        handleInput(t.clientX, t.clientY);
      }, { passive: true });

      screen.addEventListener('mousemove', e => {
        handleInput(e.clientX, e.clientY);
      });
    }

    // ── SMOOTH MOVEMENT ──
    function smoothLoop() {
      const LERP = 0.15;   // smoothing factor — higher = snappier

      function step() {
        const maxMove = eyeL.offsetWidth * 0.28;
        currentX += (targetX - currentX) * LERP;
        currentY += (targetY - currentY) * LERP;
        const tx = currentX * maxMove;
        const ty = currentY * maxMove;
        const t = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px))`;
        dotL.style.transform = t;
        dotR.style.transform = t;
        smoothFrame = requestAnimationFrame(step);
      }
      step();
    }

    // ── BLINK ──
    function startBlink() {
      function doBlink() {
        eyeL.classList.add('blink');
        eyeR.classList.add('blink');
        setTimeout(() => {
          eyeL.classList.remove('blink');
          eyeR.classList.remove('blink');
          if (Math.random() < 0.2) {
            setTimeout(() => {
              eyeL.classList.add('blink');
              eyeR.classList.add('blink');
              setTimeout(() => {
                eyeL.classList.remove('blink');
                eyeR.classList.remove('blink');
              }, 100);
            }, 180);
          }
        }, 110);
        blinkTimer = setTimeout(doBlink, 2000 + Math.random() * 4000);
      }
      blinkTimer = setTimeout(doBlink, 1200);
    }

    // ── BACK ──
    function goBack() {
      cancelAnimationFrame(animFrame);
      cancelAnimationFrame(smoothFrame);
      clearTimeout(blinkTimer);
      if (stream) stream.getTracks().forEach(t => t.stop());
      prevGray = null;
      targetX = 0;
      targetY = 0;
      currentX = 0;
      currentY = 0;
      motionWorking = false;
      lastMotionTime = 0;
      debugDot.classList.remove('cam-ok', 'motion');
      if (document.fullscreenElement) document.exitFullscreen().catch(() => {});
      document.getElementById('robotScreen').classList.remove('active');
      const landing = document.getElementById('landing');
      landing.style.display = 'flex';
      setTimeout(() => landing.classList.remove('hide'), 20);
      dotL.style.transform = 'translate(-50%, -50%)';
      dotR.style.transform = 'translate(-50%, -50%)';
    }

    // prevent unwanted touch scrolling
    document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
  </script>
</body>
</html>
