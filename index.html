<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>R0B0T</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #111; font-family: monospace;
      overflow: hidden; touch-action: none; user-select: none;
    }
    #landing {
      position: fixed; inset: 0; background: #111;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 28px; z-index: 100; transition: opacity 0.3s;
    }
    #landing.hide { opacity: 0; pointer-events: none; }
    #landing h1 { font-size: clamp(3rem, 14vw, 6rem); font-weight: 900; color: #fff; letter-spacing: 0.25em; }
    #startBtn {
      background: #fff; color: #111; border: none;
      font-family: monospace; font-weight: 900;
      font-size: clamp(1rem, 5vw, 1.4rem);
      letter-spacing: 0.2em; padding: 18px 60px;
      border-radius: 8px; cursor: pointer;
    }
    .skin-label { color: #555; font-size: 0.75rem; letter-spacing: 0.2em; text-align: center; }
    .skins { display: flex; gap: 14px; align-items: center; justify-content: center; flex-wrap: wrap; }
    .skin-swatch {
      width: 38px; height: 38px; border-radius: 8px;
      cursor: pointer; border: 3px solid transparent;
      transition: border-color 0.15s; flex-shrink: 0;
    }
    .skin-swatch.selected { border-color: #fff; }

    #robotScreen {
      position: fixed; inset: 0; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      background: #111;
    }
    #robotScreen.active { display: flex; }
    #cam { display: none; }
    #motionCanvas { display: none; }

    .eyes-wrap {
      display: flex; gap: clamp(28px, 9vw, 64px);
      align-items: center; justify-content: center;
    }
    .eye {
      width: clamp(130px, 32vw, 210px);
      height: clamp(130px, 32vw, 210px);
      border-radius: 22px; position: relative;
      overflow: hidden; background: transparent;
      transition: height 0.08s linear;
    }
    .eye.blink { height: 10px !important; border-radius: 5px; }
    .dot {
      width: 28%; height: 28%; border-radius: 8px;
      background: #fff; position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      will-change: transform;
    }

    #debugDot {
      position: fixed; top: 8px; right: 8px;
      width: 10px; height: 10px;
      border-radius: 50%; background: #333; z-index: 300;
    }
    #debugDot.cam-ok { background: #3bff7a; }
    #debugDot.motion { background: #ffcc00; }
    #debugInfo {
      position: fixed; top: 8px; left: 8px;
      color: #444; font-size: 0.6rem; letter-spacing: 0.1em;
      z-index: 300; line-height: 1.8;
    }
    #backBtn {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      background: transparent; border: 1px solid #333;
      color: #333; font-family: monospace; font-size: 0.65rem;
      letter-spacing: 0.15em; padding: 8px 22px;
      border-radius: 4px; cursor: pointer; z-index: 200;
    }
  </style>
</head>
<body>
  <div id="landing">
    <h1>R0B0T</h1>
    <button id="startBtn" onclick="startRobot()">START</button>
    <div class="skin-label">EYE COLOR</div>
    <div class="skins" id="skins"></div>
  </div>

  <div id="robotScreen">
    <video id="cam" autoplay playsinline muted></video>
    <canvas id="motionCanvas"></canvas>
    <div class="eyes-wrap">
      <div class="eye" id="eyeL"><div class="dot" id="dotL"></div></div>
      <div class="eye" id="eyeR"><div class="dot" id="dotR"></div></div>
    </div>
    <div id="debugDot"></div>
    <div id="debugInfo"></div>
    <button id="backBtn" onclick="goBack()">← EXIT</button>
  </div>

  <script>
    const SKINS = ['#ffffff','#ff3b3b','#3b8fff','#3bff7a','#ffcc00','#ff6aff','#ff8c00','#00e5ff'];
    let activeSkin = 0;
    SKINS.forEach((c, i) => {
      const sw = document.createElement('div');
      sw.className = 'skin-swatch' + (i === 0 ? ' selected' : '');
      sw.style.background = c;
      sw.onclick = () => {
        activeSkin = i;
        document.querySelectorAll('.skin-swatch').forEach((el, j) => el.classList.toggle('selected', j === i));
        applyDotColor();
      };
      document.getElementById('skins').appendChild(sw);
    });
    function applyDotColor() {
      dotL.style.background = SKINS[activeSkin];
      dotR.style.background = SKINS[activeSkin];
    }

    let stream = null;
    let animFrame = null;
    let blinkTimer = null;
    let smoothFrame = null;
    let prevGray = null;
    let targetX = 0, targetY = 0;
    let currentX = 0, currentY = 0;

    const video     = document.getElementById('cam');
    const motCanvas = document.getElementById('motionCanvas');
    const motCtx    = motCanvas.getContext('2d', { willReadFrequently: true });
    const dotL      = document.getElementById('dotL');
    const dotR      = document.getElementById('dotR');
    const eyeL      = document.getElementById('eyeL');
    const eyeR      = document.getElementById('eyeR');
    const debugDot  = document.getElementById('debugDot');
    const debugInfo = document.getElementById('debugInfo');

    async function startRobot() {
      applyDotColor();
      try {
        if (screen.orientation && screen.orientation.lock)
          screen.orientation.lock('landscape').catch(() => {});

        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 320 }, height: { ideal: 240 } },
          audio: false
        });
        video.srcObject = stream;
        await video.play();

        try {
          const el = document.documentElement;
          if (el.requestFullscreen) await el.requestFullscreen();
          else if (el.webkitRequestFullscreen) await el.webkitRequestFullscreen();
        } catch(e) {}

        document.getElementById('landing').classList.add('hide');
        setTimeout(() => {
          document.getElementById('landing').style.display = 'none';
          document.getElementById('robotScreen').classList.add('active');
        }, 300);

        await new Promise(resolve => {
          const check = () => (video.videoWidth > 0 && video.readyState >= 2) ? resolve() : requestAnimationFrame(check);
          check();
        });

        motCanvas.width  = video.videoWidth;
        motCanvas.height = video.videoHeight;

        debugDot.classList.add('cam-ok');
        debugInfo.textContent = `cam: ${video.videoWidth}x${video.videoHeight}`;

        startMotion();
        startBlink();
        smoothLoop();

      } catch(err) {
        alert('Camera access required! ' + err.message);
      }
    }

    function startMotion() {
      const THRESHOLD = 18;   // per-pixel diff to count as motion
      const MIN_PX   = 6;     // minimum changed pixels to trust centroid
      const DECAY    = 0.88;  // drift back to center when no motion

      function detect() {
        if (!video.videoWidth || video.readyState < 2) {
          animFrame = requestAnimationFrame(detect);
          return;
        }

        try {
          const w = motCanvas.width;
          const h = motCanvas.height;

          motCtx.drawImage(video, 0, 0, w, h);
          const { data } = motCtx.getImageData(0, 0, w, h);

          // Build grayscale — sample every 2nd pixel for speed
          const step = 2;
          const sw = Math.floor(w / step);
          const sh = Math.floor(h / step);
          const gray = new Uint8Array(sw * sh);

          let idx = 0;
          for (let y = 0; y < h; y += step) {
            for (let x = 0; x < w; x += step) {
              const o = (y * w + x) * 4;
              gray[idx++] = (data[o] * 77 + data[o+1] * 150 + data[o+2] * 29) >> 8;
            }
          }

          if (prevGray && prevGray.length === gray.length) {
            let sumX = 0, sumY = 0, count = 0;

            for (let i = 0; i < gray.length; i++) {
              if (Math.abs(gray[i] - prevGray[i]) > THRESHOLD) {
                sumX += i % sw;
                sumY += (i / sw) | 0;
                count++;
              }
            }

            if (count >= MIN_PX) {
              // centroid in [-1, 1] space
              // front camera is mirrored so flip X: motion on left of frame = target moves right
              const cx =  -((sumX / count / sw) - 0.5) * 2;
              const cy =   (sumY / count / sh - 0.5) * 2;
              targetX = Math.max(-1, Math.min(1, cx));
              targetY = Math.max(-1, Math.min(1, cy));
              debugDot.classList.add('motion');
              debugInfo.textContent = `cam: ${w}x${h} | px:${count} | x:${targetX.toFixed(2)} y:${targetY.toFixed(2)}`;
            } else {
              // no meaningful motion — drift back toward center
              targetX *= DECAY;
              targetY *= DECAY;
              debugDot.classList.remove('motion');
              debugInfo.textContent = `cam: ${w}x${h} | idle (${count}px)`;
            }
          }

          prevGray = gray;
        } catch(err) {
          console.warn('frame err:', err.message);
        }

        animFrame = requestAnimationFrame(detect);
      }

      detect();
    }

    function smoothLoop() {
      const LERP = 0.10;
      function step() {
        const maxMove = eyeL.offsetWidth * 0.32;
        currentX += (targetX - currentX) * LERP;
        currentY += (targetY - currentY) * LERP;
        const t = `translate(calc(-50% + ${currentX * maxMove}px), calc(-50% + ${currentY * maxMove}px))`;
        dotL.style.transform = t;
        dotR.style.transform = t;
        smoothFrame = requestAnimationFrame(step);
      }
      step();
    }

    function startBlink() {
      function doBlink() {
        eyeL.classList.add('blink'); eyeR.classList.add('blink');
        setTimeout(() => {
          eyeL.classList.remove('blink'); eyeR.classList.remove('blink');
          if (Math.random() < 0.2) {
            setTimeout(() => {
              eyeL.classList.add('blink'); eyeR.classList.add('blink');
              setTimeout(() => { eyeL.classList.remove('blink'); eyeR.classList.remove('blink'); }, 100);
            }, 180);
          }
        }, 110);
        blinkTimer = setTimeout(doBlink, 2000 + Math.random() * 4000);
      }
      blinkTimer = setTimeout(doBlink, 1200);
    }

    function goBack() {
      cancelAnimationFrame(animFrame);
      cancelAnimationFrame(smoothFrame);
      clearTimeout(blinkTimer);
      if (stream) stream.getTracks().forEach(t => t.stop());
      prevGray = null;
      targetX = 0; targetY = 0; currentX = 0; currentY = 0;
      debugDot.classList.remove('cam-ok', 'motion');
      if (document.fullscreenElement) document.exitFullscreen().catch(() => {});
      document.getElementById('robotScreen').classList.remove('active');
      const landing = document.getElementById('landing');
      landing.style.display = 'flex';
      setTimeout(() => landing.classList.remove('hide'), 20);
      dotL.style.transform = 'translate(-50%, -50%)';
      dotR.style.transform = 'translate(-50%, -50%)';
    }
  </script>
</body>
</html>
